<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrupted Files - Internet Archive Database Visualizer</title>
  
  <!-- DataTables & Google Fonts -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      color: #38bdf8;
      font-size: 2.2rem;
      margin: 0 0 8px 0;
    }
    .header p {
      color: #94a3b8;
      margin: 0;
    }
    .card {
      max-width: 1300px;
      margin: 0 auto;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }
    table.dataTable {
      width: 100% !important;
      border-collapse: collapse !important;
      color: #f8fafc;
    }
    table.dataTable thead th {
      background-color: #0f172a;
      color: #38bdf8;
      border-bottom: 2px solid #334155 !important;
      padding: 12px 16px;
      font-weight: 600;
    }
    table.dataTable tbody tr {
      background-color: #1e293b !important;
      border-bottom: 1px solid #334155;
    }
    table.dataTable tbody tr:hover {
      background-color: #334155 !important;
    }
    table.dataTable tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }
    .badge-format {
      background-color: #3b82f6;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-block;
    }
    .badge-resolution {
      background-color: #8b5cf6;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-block;
      margin-left: 4px;
    }
    .btn-action {
      background-color: #0284c7;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-action:hover {
      background-color: #0369a1;
    }
    code {
      font-family: monospace;
      background-color: #0f172a;
      padding: 3px 6px;
      border-radius: 4px;
      color: #cbd5e1;
      font-size: 0.85rem;
    }
    .dataTables_wrapper .dataTables_length,
    .dataTables_wrapper .dataTables_filter,
    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_processing,
    .dataTables_wrapper .dataTables_paginate {
      color: #94a3b8 !important;
      margin-bottom: 12px;
    }
    .dataTables_wrapper .dataTables_filter input {
      background-color: #0f172a;
      border: 1px solid #334155;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      outline: none;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      color: #f8fafc !important;
      border-radius: 4px !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current {
      background: #0284c7 !important;
      border-color: #0284c7 !important;
      color: white !important;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎬 Corrupted Files Archive Database</h1>
    <p>Live XML Database Visualizer linked to Internet Archive item: <code>corrupted_files</code></p>
  </div>

  <div class="card">
    <table id="xmlDbTable" class="display">
      <thead>
        <tr>
          <th>File Name</th>
          <th>Format & Quality</th>
          <th>Duration</th>
          <th>Size</th>
          <th>SHA1 Checksum</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <script>
    const XML_URL = "https://ia902801.us.archive.org/26/items/corrupted_files/corrupted_files_files.xml";
    const BASE_DOWNLOAD_URL = "https://archive.org/download/corrupted_files/";

    function formatDuration(secondsStr) {
      if (!secondsStr) return "N/A";
      const totalSec = Math.floor(parseFloat(secondsStr));
      const mins = Math.floor(totalSec / 60);
      const secs = totalSec % 60;
      return `${mins}m ${secs}s`;
    }

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    async function initDatabase() {
      try {
        const response = await fetch(XML_URL);
        const xmlText = await response.text();

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        const fileElements = xmlDoc.getElementsByTagName("file");

        const rows = [];

        for (let file of fileElements) {
          const fileName = file.getAttribute("name");
          const source = file.getAttribute("source");

          // Only display original media files (exclude auto-generated thumbnails)
          if (source !== "original" && !fileName.endsWith(".mp4") && !fileName.endsWith(".mkv")) {
            continue;
          }

          const format = file.getElementsByTagName("format")[0]?.textContent || "Media";
          const width = file.getElementsByTagName("width")[0]?.textContent;
          const height = file.getElementsByTagName("height")[0]?.textContent;
          const resolution = (width && height) ? `${width}x${height}` : "";

          const length = file.getElementsByTagName("length")[0]?.textContent;
          const sizeBytes = parseInt(file.getElementsByTagName("size")[0]?.textContent || "0");
          const sha1 = file.getElementsByTagName("sha1")[0]?.textContent || "N/A";

          const directUrl = BASE_DOWNLOAD_URL + encodeURIComponent(fileName);

          const formatHtml = `<span class="badge-format">${format}</span>` + 
                             (resolution ? `<span class="badge-resolution">${resolution}</span>` : "");

          const actionHtml = `<a href="${directUrl}" target="_blank" class="btn-action">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Stream / Download
                              </a>`;

          rows.push([
            `<strong>${fileName}</strong>`,
            formatHtml,
            formatDuration(length),
            formatBytes(sizeBytes),
            `<code>${sha1.substring(0, 12)}...</code>`,
            actionHtml
          ]);
        }

        $('#xmlDbTable').DataTable({
          data: rows,
          columns: [
            { title: "File Name" },
            { title: "Format & Quality" },
            { title: "Duration" },
            { title: "Size" },
            { title: "SHA1 Checksum" },
            { title: "Action", orderable: false }
          ],
          pageLength: 25,
          order: [[0, 'asc']]
        });

      } catch (err) {
        console.error("Failed to load XML database:", err);
      }
    }

    initDatabase();
  </script>
</body>
</html>
